<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MD 合併工具</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans TC', sans-serif; background: #0f0f13; color: #e8e8f0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; }
  h1 { font-size: 1.8rem; margin-bottom: 8px; background: linear-gradient(135deg, #e8e8f0, #a89fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  p.sub { color: #888899; font-size: 14px; margin-bottom: 32px; }
  .card { background: #17171f; border: 1px solid #2a2a3a; border-radius: 14px; padding: 28px; width: 100%; max-width: 560px; display: flex; flex-direction: column; gap: 20px; }
  .drop-zone { border: 2px dashed #2a2a3a; border-radius: 10px; padding: 32px; text-align: center; cursor: pointer; position: relative; transition: all 0.2s; }
  .drop-zone:hover, .drop-zone.over { border-color: #6c63ff; background: rgba(108,99,255,0.06); }
  .drop-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .drop-zone .icon { font-size: 32px; display: block; margin-bottom: 8px; }
  .drop-zone p { color: #888899; font-size: 14px; }
  .drop-zone strong { color: #e8e8f0; }
  #file-list { display: flex; flex-direction: column; gap: 6px; }
  .file-row { background: #1e1e2a; border: 1px solid #2a2a3a; border-radius: 8px; padding: 9px 12px; display: flex; align-items: center; gap: 8px; cursor: grab; user-select: none; }
  .file-row:active { cursor: grabbing; }
  .file-row.dragging { opacity: 0.4; }
  .file-row.over { border-color: #6c63ff; }
  .file-row .name { flex: 1; font-family: 'JetBrains Mono', monospace; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-row .del { background: none; border: none; color: #888899; cursor: pointer; font-size: 14px; padding: 2px 5px; border-radius: 4px; flex-shrink: 0; }
  .file-row .del:hover { color: #ff6584; }
  label.field-label { font-size: 12px; color: #888899; display: block; margin-bottom: 6px; }
  .filename-row { display: flex; align-items: center; background: #1e1e2a; border: 1px solid #2a2a3a; border-radius: 8px; overflow: hidden; transition: border-color 0.2s; }
  .filename-row:focus-within { border-color: #6c63ff; }
  .filename-row input { flex: 1; background: transparent; border: none; padding: 9px 12px; color: #e8e8f0; font-family: 'JetBrains Mono', monospace; font-size: 13px; outline: none; }
  .filename-row span { padding: 9px 12px; color: #888899; font-family: 'JetBrains Mono', monospace; font-size: 13px; border-left: 1px solid #2a2a3a; background: #0f0f13; flex-shrink: 0; }
  .btn { border: none; border-radius: 8px; padding: 11px 20px; font-family: 'Noto Sans TC', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s; width: 100%; }
  .btn-primary { background: #6c63ff; color: #fff; }
  .btn-primary:hover { background: #7c74ff; transform: translateY(-1px); }
  .btn-primary:disabled { background: #2a2a3a; color: #555; cursor: not-allowed; transform: none; }
  #status { font-size: 12px; color: #888899; text-align: center; min-height: 18px; }
  #status.ok { color: #4ade80; }
</style>
</head>
<body>
<h1>MD 合併工具</h1>
<p class="sub">上傳多個 Markdown 檔案，合併後下載</p>
<div class="card">
  <div class="drop-zone" id="drop-zone">
    <input type="file" id="file-input" multiple accept=".md,.markdown">
    <span class="icon">📂</span>
    <p><strong>點擊或拖曳</strong>上傳 .md 檔案</p>
    <p style="font-size:12px;margin-top:4px">可一次選多個，拖曳列表調整順序</p>
  </div>

  <div id="file-list"></div>

  <div>
    <label class="field-label">下載檔名</label>
    <div class="filename-row">
      <input type="text" id="filename" value="merged" placeholder="輸入檔名">
      <span>.md</span>
    </div>
  </div>

  <button class="btn btn-primary" id="merge-btn" onclick="merge()" disabled>⬇ 合併並下載</button>
  <div id="status"></div>
</div>

<script>
let files = [];
let dragIdx = null;

const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('over'); load(e.dataTransfer.files); });
fileInput.addEventListener('change', e => { load(e.target.files); fileInput.value = ''; });

async function load(fileList) {
  for (const f of fileList) {
    if (!f.name.match(/\.(md|markdown)$/i)) continue;
    if (files.find(x => x.name === f.name)) continue;
    let text = await f.text();
    text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
    files.push({ name: f.name, text });
  }
  render();
}

function render() {
  const list = document.getElementById('file-list');
  document.getElementById('merge-btn').disabled = files.length === 0;
  const s = document.getElementById('status');
  s.textContent = files.length ? `已載入 ${files.length} 個檔案` : '';
  s.className = files.length ? 'ok' : '';

  if (!files.length) { list.innerHTML = ''; return; }

  list.innerHTML = files.map((f, i) => `
    <div class="file-row" draggable="true"
      ondragstart="dragIdx=${i};this.classList.add('dragging')"
      ondragover="event.preventDefault();document.querySelectorAll('.file-row').forEach((el,j)=>el.classList.toggle('over',j===${i}))"
      ondrop="event.preventDefault();drop(${i})"
      ondragend="document.querySelectorAll('.file-row').forEach(el=>el.classList.remove('dragging','over'));dragIdx=null">
      <span style="color:#555;font-size:13px;flex-shrink:0">⠿</span>
      <span class="name" title="${esc(f.name)}">📄 ${esc(f.name)}</span>
      <button class="del" onclick="files.splice(${i},1);render()">✕</button>
    </div>`).join('');
}

function drop(i) {
  if (dragIdx === null || dragIdx === i) return;
  const moved = files.splice(dragIdx, 1)[0];
  files.splice(i, 0, moved);
  render();
}

function merge() {
  if (!files.length) return;
  const content = files.map(f => f.text.trim()).join('\n\n');
  const blob = new Blob([content], { type: 'text/markdown;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const name = (document.getElementById('filename').value.trim() || 'merged').replace(/\.md$/i, '');
  a.download = name + '.md';
  a.click();
  URL.revokeObjectURL(url);
  const s = document.getElementById('status');
  s.textContent = `✓ 已下載 ${name}.md`;
  s.className = 'ok';
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
